apiVersion: schema.esdm.io/core/v1
kind: process-manager
name: timer-manager
scope:
  domain: activity-sampling
deliveryGuarantee: at-most-once
correlatedBy:
  source: event-field
  field: timer
state:
  type: object
  properties:
    timer:
      type: string
    isRunning:
      type: boolean
    interval:
      type: string
      format: duration
    next-elapse-at:
      type: string
      format: date-time
  required: [timer, isRunning]
startsWhen:
  - boundedContext: activity-sampling
    aggregate: timer
    event: started
endsWhen:
  - name: timer-stopped
    condition: state.isRunning is false.
timers:
  - name: next-interval
    at: next-elapse-at
reactions:
  - when:
      boundedContext: activity-sampling
      aggregate: timer
      event: started
    rule:
      Set state.isRunning to true, copy timer and interval from the event, compute next-elapse-at
      from timestamp plus interval, and set timer next-interval.
    setTimers:
      - next-interval
  - when:
      timer: next-interval
    rule:
      Emit elapse-interval for this timer, compute the next next-elapse-at by adding state.interval,
      and set timer next-interval again.
    emits:
      - boundedContext: activity-sampling
        aggregate: timer
        command: elapse-interval
    setTimers:
      - next-interval
  - when:
      boundedContext: activity-sampling
      aggregate: timer
      event: stopped
    rule: Set state.isRunning to false and cancel timer next-interval.
    cancelTimers:
      - next-interval
