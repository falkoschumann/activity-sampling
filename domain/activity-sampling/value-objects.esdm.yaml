apiVersion: schema.esdm.io/core/v1
kind: value-object
name: timesheet-entry
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
schema:
  type: object
  properties:
    date:
      type: string
      format: date
    client:
      type: string
    project:
      type: string
    task:
      type: string
    hours:
      type: string
      format: duration
  required: [date, client, project, task, hours]
---
apiVersion: schema.esdm.io/core/v1
kind: value-object
name: timesheet-data
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
schema:
  type: object
  properties:
    date:
      type: string
      format: date
    client:
      type: string
    project:
      type: string
    task:
      type: string
    notes:
      type: string
    hours:
      type: number
    firstName:
      type: string
    lastName:
      type: string
  required: [date, client, project, task, hours, firstName, lastName]
