apiVersion: schema.esdm.io/core/v1
kind: aggregate
name: settings
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
identifiedBy:
  source: static
  value: settings
state:
  type: object
  properties:
    capacity:
      type: string
      format: duration
    categories:
      type: array
      items:
        type: string
    firstName:
      type: string
    lastName:
      type: string
  required: [capacity, categories]
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: change
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: settings
data:
  type: object
  properties:
    capacity:
      type: string
      format: duration
    categories:
      type: array
      items:
        type: string
    firstName:
      type: string
    lastName:
      type: string
  required: [capacity, categories]
publishes:
  - changed
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: changed
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: settings
data:
  type: object
  properties:
    capacity:
      type: string
      format: duration
    categories:
      type: array
      items:
        type: string
    firstName:
      type: string
    lastName:
      type: string
  required: [capacity, categories]
