name: Release

on: push
#  push:
#    tags:
#      - "v*.*.*"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Set up Node.js LTS
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Build package
        run: make dist
      - name: Create release
        run:
          gh release create v1.2.3 --generate-notes --prerelease ./dist/*.deb ./dist/*.dmg
          ./dist/*.exe
        #run: gh release create v1.2.3 --notes-from-tag ./dist/*.deb ./dist/*.dmg ./dist/*.exe
