apiVersion: schema.esdm.io/core/v1
kind: external-system
name: timesheet
scope:
  domain: activity-sampling
direction: outbound
category: csv-export
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: export-timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: activity-log
data:
  type: object
  properties:
    timesheets:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          client:
            type: string
          project:
            type: string
          task:
            type: string
          hours:
            type: string
            format: duration
        required: [date, client, project, task, hours]
    filename:
      type: string
  required: [timesheets, filename]
publishes:
  - timesheet-exported
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: timesheet-exported
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: activity-log
data:
  type: array
  items:
    type: object
    properties:
      date:
        type: string
        format: date
      client:
        type: string
      project:
        type: string
      task:
        type: string
      notes:
        type: string
      hours:
        type: integer
      firstName:
        type: string
      lastName:
        type: string
    required: [date, client, project, task, hours, firstName, lastName]
---
apiVersion: schema.esdm.io/core/v1
kind: event-handler
name: write-timesheet-csv
scope:
  domain: activity-sampling
deliveryGuarantee: at-most-once
handles:
  - boundedContext: activity-sampling
    aggregate: activity-log
    event: timesheet-exported
sideEffects:
  - type: external-call
    externalSystem: timesheet
    rule: Write the timesheet for the exported period as a CSV file in Harvest format.
