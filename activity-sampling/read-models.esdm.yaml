---
apiVersion: schema.esdm.io/core/v1
kind: query
name: get-burn-up
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    categories:
      type: array
      items:
        type: string
    timeZone:
      type: string
  required: [from, to, categories, timeZone]
result:
