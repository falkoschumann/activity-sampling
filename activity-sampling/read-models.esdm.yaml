apiVersion: schema.esdm.io/core/v1
kind: read-model
name: timer
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: timer
    event: started
    rule: Reset progress and set running.
  - boundedContext: activity-sampling
    aggregate: timer
    event: ticked
    rule: Update progress.
  - boundedContext: activity-sampling
    aggregate: timer
    event: elapsed
    rule: Memorize timestamp and interval of current interval.
schema:
  type: object
  properties:
    isRunning:
      type: boolean
    elapsedTime:
      type: string
      format: duration
    progress:
      type: number
    currentTimestamp:
      type: string
      format: date-time
    currentDuration:
      type: string
      format: duration
  required: [isRunning, elapsedTime, progress]
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: current-interval
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: timer
result:
  type: object
  properties:
    timestamp:
      type: string
      format: date-time
    duration:
      type: string
      format: duration
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: recent-activities
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: timesheet
parameters:
  type: object
  properties:
    today:
      type: string
      format: date
    timezone:
      type: string
  required: [today, timezone]
result:
  type: array
  items:
    type: object
    properties:
      workingDays:
        type: array
        items:
          type: object
          properties:
            date:
              type: string
              format: date
              description: The date of the working day in local time.
            activities:
              type: array
              items:
                type: object
                properties:
                  # TODO replace dateTime with time, the date is already included in the parent object
                  dateTime:
                    type: string
                    format: date-time
                    description: The timestamp when the activity was logged in local time.
                  # TODO remove duration
                  duration:
                    type: string
                    format: duration
                  client:
                    type: string
                  project:
                    type: string
                  task:
                    type: string
                  notes:
                    type: string
                  category:
                    type: string
                required: [dateTime, duration, client, project, task]
          required: [date, activities]
      timeSummary:
        type: object
        # TODO remove prefix "hours" from property names
        properties:
          hoursToday:
            type: string
            format: duration
          hoursYesterday:
            type: string
            format: duration
          hoursThisWeek:
            type: string
            format: duration
          hoursThisMonth:
            type: string
            format: duration
        required: [hoursToday, hoursYesterday, hoursThisWeek, hoursThisMonth]
    required: [workingDays, timeSummary]
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: settings
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: settings
    event: capacity-changed
    rule: Update the capacity value used for capacity calculation.
  - boundedContext: activity-sampling
    aggregate: settings
    event: categories-changed
    rule: Update the categories list used for categorizing activities.
schema:
  type: object
  properties:
    capacity:
      type: string
      format: duration
    categories:
      type: array
      items:
        type: string
  required: [capacity, categories]
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: categories
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: settings
result:
  type: array
  items:
    type: string
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: report
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: logged-activity
    event: activity-logged
    rule:
      Join activity entries with same client, project, task and category into a single entry, update
      start and finish, and accumulate hours.
  - boundedContext: activity-sampling
    aggregate: logged-activity
    event: activity-logged
    rule: Collect a list of all categories for filtering in the statistics query.
schema:
  type: object
  properties:
    activities:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
            format: date-time
            description: The timestamp when the first activity in the entry was logged in UTC.
          finish:
            type: string
            format: date-time
            description: The timestamp when the last activity in the entry was logged in UTC.
          client:
            type: string
          project:
            type: string
          task:
            type: string
          category:
            type: string
          hours:
            type: string
            format: duration
        required: [start, finish, client, project, task, hours]
    categories:
      type: array
      items:
        type: string
  required: [activities, categories]
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: report
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    scope:
      type: string
      enum: [clients, projects, tasks, categories]
    # TODO remove from and to parameters because start and finish can be before or after and hours or cycle time are only relevant for done activities
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    timezone:
      type: string
  required: [scope, timezone]
result:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
            format: date
            description: The date when the first activity in the entry was logged in local time.
          finish:
            type: string
            format: date
            description: The date when the last activity in the entry was logged in local time.
          client:
            type: string
          project:
            type: string
          task:
            type: string
          category:
            type: string
          hours:
            type: string
            format: duration
          cycleTime:
            type: integer
        # TODO client, project, task  and category should be optional depending on the scope
        required: [start, finish, client, project, task, category, hours, cycleTime]
    totalHours:
      type: string
      format: duration
  required: [entries, totalHours]
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: statistics
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    scope:
      type: string
      enum: [workingHours, cycleTime]
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
  required: [scope]
result:
  type: object
  properties:
    histogram:
      type: array
      items:
        type: object
        properties:
          binEdges:
            type: array
            items:
              type: string
          frequencies:
            type: array
            items:
              type: integer
          xAxisLabel:
            type: string
          yAxisLabel:
            type: string
        required: [binEdges, frequencies, xAxisLabel, yAxisLabel]
    median:
      type: object
      properties:
        edge0:
          type: number
        edge25:
          type: number
        edge50:
          type: number
        edge75:
          type: number
        edge100:
          type: number
      required: [edge0, edge25, edge50, edge75, edge100]
    categories:
      type: array
      items:
        type: string
    totalCount:
      type: integer
  required: [histogram, median, categories, totalCount]
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: estimate
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
result:
  type: object
  properties:
    cycleTimes:
      type: array
      items:
        type: object
        properties:
          cycleTime:
            type: integer
          frequency:
            type: integer
          probability:
            type: number
          cumulativeProbability:
            type: number
        required: [cycleTime, frequency, probability, cumulativeProbability]
    categories:
      type: array
      items:
        type: string
    totalCount:
      type: integer
  required: [cycleTimes, categories, totalCount]
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: burn-up
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
  required: [from, to]
result:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          throughput:
            type: integer
          cumulativeThroughput:
            type: number
        required: [date, throughput, cumulativeThroughput]
    categories:
      type: array
      items:
        type: string
    totalThroughput:
      type: integer
  required: [data, categories, totalThroughput]
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: logged-activity
    event: activity-logged
    rule: Append the activity entry to the timesheet.
  - boundedContext: activity-sampling
    aggregate: settings
    event: capacity-changed
    rule: Update the capacity value used for capacity calculation.
  - boundedContext: activity-sampling
    aggregate: calendar
    event: holidays-changed
    rule: Update the holidays list used for capacity calculation.
  - boundedContext: activity-sampling
    aggregate: calendar
    event: vacation-changed
    rule: Update the vacation list used for capacity calculation.
schema:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          timestamp:
            type: string
            format: date-time
            description: The timestamp when the activity was logged in UTC.
          duration:
            type: string
            format: duration
          client:
            type: string
          project:
            type: string
          task:
            type: string
          notes:
            type: string
          category:
            type: string
        required: [timestamp, duration, client, project, task]
    holidays:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          title:
            type: string
          duration:
            type: string
            format: duration
        required: [date, title]
    vacations:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          duration:
            type: string
            format: duration
        required: [date]
    capacity:
      type: string
      format: duration
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: timesheet
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
      description: The start date of the timesheet period in local time.
    to:
      type: string
      format: date
      description: The end date of the timesheet period in local time.
    today:
      type: string
      format: date
    timezone:
      type: string
  required: [from, to, today, timezone]
result:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
            description: The date when the activity was logged in local time.
          client:
            type: string
          project:
            type: string
          task:
            type: string
          hours:
            type: string
            format: duration
        required: [date, client, project, task, hours]
    totalHours:
      type: string
      format: duration
    capacity:
      type: object
      properties:
        hours:
          type: string
          format: duration
        offset:
          type: string
          format: duration
      required: [hours, offset]
  required: [entries, totalHours, capacity]
actors:
  - software-developer
