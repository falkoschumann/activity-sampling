apiVersion: schema.esdm.io/core/v1
kind: read-model
name: current-interval
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: timer
    event: started
    rule: Set interval to the value from the event.
  - boundedContext: activity-sampling
    aggregate: timer
    event: stopped
    rule: Clear the interval because the timer is no longer running.
schema:
  type: object
  properties:
    interval:
      type: string
      format: duration
    running:
      type: boolean
    timestamp:
      type: string
      format: date-time
    currentInterval:
      type: string
      format: duration
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: current-interval
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: current-interval
result:
  type: object
  properties:
    timestamp:
      type: string
      format: date-time
    duration:
      type: string
      format: duration
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: recent-activities
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: activity-log
    event: activity-logged
    rule: Append the activity entry and retain only entries from the last 30 days.
schema:
  type: array
  items:
    type: object
    properties:
      timestamp:
        type: string
        format: date-time
        description: The timestamp when the activity was logged in UTC.
      duration:
        type: integer
      client:
        type: string
      project:
        type: string
      task:
        type: string
      notes:
        type: string
      category:
        type: string
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: recent-activities
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: recent-activities
parameters:
  type: object
  properties:
    today:
      type: string
      format: date
    timezone:
      type: string
result:
  type: array
  items:
    type: object
    properties:
      categories:
        type: array
        items:
          type: string
      workingDays:
        type: array
        items:
          type: object
          properties:
            date:
              type: string
              format: date
              description: The date of the working day in local time.
            activities:
              type: array
              items:
                type: object
                properties:
                  # TODO replace dateTime with time, the date is already included in the parent object
                  dateTime:
                    type: string
                    format: date-time
                    description: The timestamp when the activity was logged in local time.
                  # TODO remove duration
                  duration:
                    type: string
                    format: duration
                  client:
                    type: string
                  project:
                    type: string
                  task:
                    type: string
                  notes:
                    type: string
                  category:
                    type: string
                required: [dateTime, duration, client, project, task]
          required: [date, activities]
      timeSummary:
        type: object
        # TODO remove prefix "hours" from property names
        properties:
          hoursToday:
            type: string
            format: duration
          hoursYesterday:
            type: string
            format: duration
          hoursThisWeek:
            type: string
            format: duration
          hoursThisMonth:
            type: string
            format: duration
        required: [hoursToday, hoursYesterday, hoursThisWeek, hoursThisMonth]
    required: [categories, workingDays, timeSummary]
constraints:
  - name: group-by-working-day
    rule: Group activities by working day, newest day first.
  - name: order-activities-by-time
    rule: Order activities within a working day by time, newest first.
  - name: summarize-hours
    rule: Include summary totals for today, yesterday, this week and this month.
actors:
  - software-developer
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: report
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: activity-log
    event: activity-logged
    rule:
      Join activity entries with same client, project, task and category into a single entry, update
      start and finish, and accumulate hours.
  - boundedContext: activity-sampling
    aggregate: activity-log
    event: activity-logged
    rule: Collect a list of all categories for filtering in the statistics query.
schema:
  type: object
  properties:
    activities:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
            format: date
          finish:
            type: string
            format: date
          client:
            type: string
          project:
            type: string
          task:
            type: string
          category:
            type: string
          hours:
            type: string
            format: duration
        required: [start, finish, client, project, task, category, hours]
    categories:
      type: array
      items:
        type: string
  required: [activities, categories]
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: report
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    scope:
      type: string
      enum: [clients, projects, tasks, categories]
    # TODO remove from and to parameters because start and finish can be before or after and hours or cycle time are only relevant for done activities
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    timezone:
      type: string
  required: [scope]
result:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          start:
            type: string
            format: date
          finish:
            type: string
            format: date
          client:
            type: string
          project:
            type: string
          task:
            type: string
          category:
            type: string
          hours:
            type: string
            format: duration
          cycleTime:
            type: integer
        # TODO client, project, task  and category should be optional depending on the scope
        required: [start, finish, client, project, task, category, hours, cycleTime]
    totalHours:
      type: string
      format: duration
  required: [entries, totalHours]
constraints:
  - name: group-by-scope
    rule: Group entries by the specified scope (clients, projects, tasks or categories).
  - name: calculate-cycle-time
    rule: Calculate cycle time as the difference between start and finish dates.
  - name: total-hours
    rule: Include total hours for all entries in the result.
  # TODO remove filter-by-period constraint
  - name: filter-by-period
    rule: Only include activities whose timestamp falls within the period.
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: statistics
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    scope:
      type: string
      enum: [workingHours, cycleTime]
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
  required: [scope]
result:
  type: object
  properties:
    histogram:
      type: array
      items:
        type: object
        properties:
          binEdges:
            type: array
            items:
              type: string
          frequencies:
            type: array
            items:
              type: integer
          xAxisLabel:
            type: string
          yAxisLabel:
            type: string
        required: [binEdges, frequencies, xAxisLabel, yAxisLabel]
    median:
      type: object
      properties:
        edge0:
          type: number
        edge25:
          type: number
        edge50:
          type: number
        edge75:
          type: number
        edge100:
          type: number
      required: [edge0, edge25, edge50, edge75, edge100]
    categories:
      type: array
      items:
        type: string
    totalCount:
      type: integer
  required: [histogram, median, categories, totalCount]
constraints:
  - name: group-by-scope
    rule: Group entries by the specified scope (clients, projects, tasks or categories).
  - name: total-count
    rule: Include total count for all entries in the result.
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: estimate
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
result:
  type: object
  properties:
    cycleTimes:
      type: array
      items:
        type: object
        properties:
          cycleTime:
            type: integer
          frequency:
            type: integer
          probability:
            type: number
          cumulativeProbability:
            type: number
        required: [cycleTime, frequency, probability, cumulativeProbability]
    categories:
      type: array
      items:
        type: string
    totalCount:
      type: integer
  required: [cycleTimes, categories, totalCount]
constraints:
  - name: total-count
    rule: Include total count for all entries in the result.
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: burn-up
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: report
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    categories:
      type: array
      items:
        type: string
    timezone:
      type: string
  required: [from, to]
result:
  type: object
  properties:
    data:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          throughput:
            type: integer
          cumulativeThroughput:
            type: number
        required: [date, throughput, cumulativeThroughput]
    categories:
      type: array
      items:
        type: string
    totalThroughput:
      type: integer
  required: [data, categories, totalThroughput]
constraints:
  - name: total-count
    rule: Include total count for all entries in the result.
actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: read-model
name: timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
projections:
  - boundedContext: activity-sampling
    aggregate: activity-log
    event: activity-logged
    rule: Accumulate worked hours per task per day.
  - boundedContext: activity-sampling
    aggregate: calendar
    event: holidays-changed
    rule: Update the holidays list used for capacity calculation.
  - boundedContext: activity-sampling
    aggregate: calendar
    event: vacation-changed
    rule: Update the vacation list used for capacity calculation.
schema:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          client:
            type: string
          project:
            type: string
          task:
            type: string
          hours:
            type: string
            format: duration
        required: [date, client, project, task, hours]
    holidays:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          title:
            type: string
          duration:
            type: string
            format: duration
        required: [date, title]
    vacation:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          duration:
            type: string
            format: duration
        required: [date]
    capacity:
      type: string
      format: duration
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: timesheet
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    today:
      type: string
      format: date
    timezone:
      type: string
  required: [from, to]
result:
  type: object
  properties:
    entries:
      type: array
      items:
        type: object
        properties:
          date:
            type: string
            format: date
          client:
            type: string
          project:
            type: string
          task:
            type: string
          hours:
            type: string
            format: duration
        required: [date, client, project, task, hours]
    totalHours:
      type: string
      format: duration
    capacity:
      type: object
      properties:
        hours:
          type: string
          format: duration
        offset:
          type: string
          format: duration
      required: [hours, offset]
  required: [entries, totalHours, capacity]
constraints:
  - name: filter-by-period
    rule: Only include activities whose timestamp falls within the period.
  - name: capacity-accounts-for-holidays-and-vacation
    rule: Subtract holidays and vacation from capacity for the given period.
actors:
  - software-developer
