actors:
  - product-owner
---
apiVersion: schema.esdm.io/core/v1
kind: query
name: get-timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
readModel: timesheet
parameters:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
    today:
      type: string
      format: date
    timezone:
      type: string
  required: [from, to, today, timezone]
result:
  type: object
  properties:
    entries:
      type: array
      items:
        type: TimesheetEntry
    totalHours:
      type: string
      format: duration
    capacity:
      type: Capacity
  required: [entries, totalHours, capacity]
actors:
  - software-developer
