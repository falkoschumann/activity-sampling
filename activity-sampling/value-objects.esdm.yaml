apiVersion: schema.esdm.io/core/v1
kind: value-object
name: report-entry
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
schema:
  type: object
  properties:
    start:
      type: string
      format: date
    finish:
      type: string
      format: date
    client:
      type: string
    project:
      type: string
    task:
      type: string
    category:
      type: string
    hours:
      type: string
      format: duration
