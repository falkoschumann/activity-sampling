apiVersion: schema.esdm.io/core/v1
kind: external-system
name: csv-file
scope:
  domain: activity-sampling
direction: outbound
category: file-export
capabilities:
  - Write timesheet data as a CSV file in Harvest format.
---
apiVersion: schema.esdm.io/core/v1
kind: command
name: export-timesheet
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: activity
data:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
  required: [from, to]
publishes:
  - timesheet-exported
actors:
  - user
---
apiVersion: schema.esdm.io/core/v1
kind: event
name: timesheet-exported
scope:
  domain: activity-sampling
  boundedContext: activity-sampling
  aggregate: activity
data:
  type: object
  properties:
    from:
      type: string
      format: date
    to:
      type: string
      format: date
  required: [from, to]
---
apiVersion: schema.esdm.io/core/v1
kind: event-handler
name: write-timesheet-csv
scope:
  domain: activity-sampling
deliveryGuarantee: at-most-once
handles:
  - boundedContext: activity-sampling
    aggregate: activity
    event: timesheet-exported
sideEffects:
  - type: external-call
    externalSystem: csv-file
    rule: Write the timesheet for the exported period as a CSV file in Harvest format.

